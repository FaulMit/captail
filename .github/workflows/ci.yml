name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows x64
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: src/Captail/packages.lock.json

      - name: Acquire minimal OBS runtime
        shell: pwsh
        run: ./tools/AcquireObsRuntime.ps1

      - name: Build Release
        shell: pwsh
        run: |
          dotnet restore ./src/Captail/Captail.csproj --locked-mode
          dotnet build ./Captail.sln -c Release --no-restore `
            -p:ContinuousIntegrationBuild=true

      - name: Run full .NET analyzers
        shell: pwsh
        run: |
          dotnet build ./src/Captail/Captail.csproj -c Debug --no-restore `
            -p:EnableNETAnalyzers=true `
            -p:AnalysisLevel=latest-all `
            -p:AnalysisMode=All `
            -p:WarningsAsErrors=CA1806%3BCA2000%3BCA2216%3BCA5392%3BCA5393

      - name: Validate GPU capability model
        shell: pwsh
        run: |
          $exe = Resolve-Path './src/Captail/bin/Debug/net9.0-windows10.0.22621.0/win-x64/Captail.exe'
          $process = Start-Process -FilePath $exe -ArgumentList '--qa-capability-model' `
            -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Capability model QA failed: $($process.ExitCode)"
          }

      - name: Validate localization dictionaries
        shell: pwsh
        run: |
          [xml]$en = Get-Content ./src/Captail/Languages/Strings.en.xaml
          [xml]$ru = Get-Content ./src/Captail/Languages/Strings.ru.xaml
          $enKeys = @($en.ResourceDictionary.String | ForEach-Object { $_.Key })
          $ruKeys = @($ru.ResourceDictionary.String | ForEach-Object { $_.Key })
          $differences = @(Compare-Object $enKeys $ruKeys)
          if ($differences.Count -ne 0) {
            $differences | Format-Table | Out-String | Write-Error
            throw "English and Russian localization keys differ."
          }
          if ($enKeys.Count -ne ($enKeys | Sort-Object -Unique).Count) {
            throw "English localization contains duplicate keys."
          }
          if ($ruKeys.Count -ne ($ruKeys | Sort-Object -Unique).Count) {
            throw "Russian localization contains duplicate keys."
          }
          Write-Host "Localization dictionaries match: $($enKeys.Count) keys."
